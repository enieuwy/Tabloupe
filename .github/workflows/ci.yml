name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
      - name: Install deps
        run: npm ci
      - name: WebExtension lint, tests, audit
        run: npm run verify

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: betterleaks
        run: |
          set -euo pipefail
          BL_VERSION=1.6.1
          BL_SHA256=fbefc700a0bd4522cc952dd2a8f259cdb80526d7e60114aca19bb2d6fdc80f81
          TMP="$(mktemp -d)"
          curl -sSL "https://github.com/betterleaks/betterleaks/releases/download/v${BL_VERSION}/betterleaks_${BL_VERSION}_linux_x64.tar.gz" -o "$TMP/bl.tar.gz"
          echo "${BL_SHA256}  $TMP/bl.tar.gz" | sha256sum -c -
          tar -xzf "$TMP/bl.tar.gz" -C "$TMP" betterleaks
          "$TMP/betterleaks" git . --no-banner --redact
